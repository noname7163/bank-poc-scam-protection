<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="login.pageTitle">Banking Shield — Sign in</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
    <noscript>
      <div style="position:fixed;inset:0;z-index:9999;background:#b91c1c;color:#fff;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;font-family:system-ui,sans-serif">
        <div style="max-width:32rem">
          <h1 style="font-size:2rem;font-weight:bold;margin:0 0 1rem">JavaScript required</h1>
          <p style="font-size:1.125rem;line-height:1.5;margin:0">This page cannot be displayed safely without JavaScript protection. Please enable JavaScript or clarify this in person at a branch of your bank.</p>
        </div>
      </div>
    </noscript>
    <main class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-6">
      <div class="rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
        <header class="mb-6 flex items-start justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="grid h-10 w-10 place-items-center rounded-lg bg-blue-600 text-white font-bold">BS</div>
            <div>
              <h1 class="text-xl font-semibold" data-i18n="login.title">Banking Shield</h1>
              <p class="text-sm text-slate-500" data-i18n="login.subtitle">Demo Online Banking</p>
            </div>
          </div>
          <select
            data-language-switcher
            aria-label="Language"
            class="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs"
          >
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
          </select>
        </header>

        <div class="mb-4 rounded-lg border border-dashed border-amber-300 bg-amber-50 p-3">
          <label class="block">
            <span
              class="text-xs font-medium uppercase tracking-wide text-amber-800"
              data-i18n="login.demoQuickSelect"
            >Demo quick select</span>
            <select
              id="demo-user-select"
              class="mt-1 w-full rounded-lg border border-amber-300 bg-white px-3 py-2 text-sm focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-200"
            >
              <option value="" data-i18n="login.demoPlaceholder">— Choose a demo user —</option>
              <option value="alice@example.com">Alice Müller (alice@example.com)</option>
              <option value="bob@example.com">Bob Schneider (bob@example.com)</option>
              <option value="charlie@example.com">Charlie Fischer (charlie@example.com)</option>
            </select>
          </label>
        </div>

        <form id="login-form" class="space-y-4" autocomplete="off">
          <label class="block">
            <span class="text-sm font-medium text-slate-700" data-i18n="login.email">Email</span>
            <input
              type="email"
              name="email"
              required
              data-i18n-placeholder="login.emailPlaceholder"
              placeholder="alice@example.com"
              class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
            />
          </label>
          <label class="block">
            <span class="text-sm font-medium text-slate-700" data-i18n="login.password">Password</span>
            <input
              type="password"
              name="password"
              required
              data-i18n-placeholder="login.passwordPlaceholder"
              placeholder="demo123"
              class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
            />
          </label>
          <button
            type="submit"
            data-i18n="login.submit"
            class="w-full rounded-lg bg-blue-600 px-4 py-2 font-medium text-white shadow-sm hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
          >
            Sign in
          </button>
        </form>

        <p id="status" class="mt-6 text-xs text-slate-500"></p>
      </div>
    </main>

    <script type="module" src="/src/pages/login.ts"></script>
  </body>
</html>
