<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="overview.pageTitle">Banking Shield — Overview</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
    <noscript>
      <div style="position:fixed;inset:0;z-index:9999;background:#b91c1c;color:#fff;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;font-family:system-ui,sans-serif">
        <div style="max-width:32rem">
          <h1 style="font-size:2rem;font-weight:bold;margin:0 0 1rem">JavaScript required</h1>
          <p style="font-size:1.125rem;line-height:1.5;margin:0">This page cannot be displayed safely without JavaScript protection. Please enable JavaScript or clarify this in person at a branch of your bank.</p>
        </div>
      </div>
    </noscript>
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-3xl items-center justify-between px-6 py-4">
        <div class="flex items-center gap-3">
          <div class="grid h-9 w-9 place-items-center rounded-lg bg-blue-600 text-white font-bold">BS</div>
          <span class="text-lg font-semibold" data-i18n="login.title">Banking Shield</span>
        </div>
        <div class="flex items-center gap-3">
          <span id="user-name" class="text-sm text-slate-600"></span>
          <select
            data-language-switcher
            aria-label="Language"
            class="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs"
          >
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
          </select>
          <button
            id="logout-btn"
            data-i18n="common.signOut"
            class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50"
          >
            Sign out
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-3xl px-6 py-8 space-y-6">
      <section class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
        <p class="text-sm text-slate-500" data-i18n="overview.balanceLabel">Account balance</p>
        <p
          id="balance"
          data-protected="balance"
          class="mt-2 text-4xl font-semibold tabular-nums"
        >—</p>
        <p class="mt-3 flex items-center gap-2 text-xs text-slate-500">
          <span data-i18n="overview.ibanLabel">IBAN</span>
          <span id="iban" data-protected="iban" class="font-mono">—</span>
        </p>
      </section>

      <section class="rounded-2xl bg-white shadow-sm ring-1 ring-slate-200">
        <h2
          class="px-6 pt-5 text-sm font-semibold uppercase tracking-wide text-slate-500"
          data-i18n="overview.recentLabel"
        >
          Recent transactions
        </h2>
        <ul id="tx-list" data-protected="tx-list" class="mt-3 divide-y divide-slate-200">
          <li class="px-6 py-4 text-sm text-slate-500" data-i18n="overview.loadingTx">Loading transactions …</li>
        </ul>
      </section>

      <p id="error" class="hidden rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700"></p>
    </main>

    <script type="module" src="/src/pages/overview.ts"></script>
  </body>
</html>
