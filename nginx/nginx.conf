# Banking Shield — unified ingress.
#
# Routes:
#   /admin/...      → admin-frontend (Vite with base='/admin/')
#   /api/admin/...  → backend (admin endpoints, gated by bs_admin cookie)
#   /api/...        → backend (banking endpoints)
#   everything else → banking-frontend (Vite)
#
# WebSocket upgrade headers are passed everywhere so Vite HMR works for
# both frontends.
#
# The strict Content-Security-Policy (SPEC §4.4) is delivered as an HTTP
# header here. Some directives — most notably frame-ancestors — are only
# honoured when the policy arrives as a header; <meta http-equiv> would
# silently drop them.

worker_processes auto;
events { worker_connections 1024; }

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream backend         { server backend:3000; }
  upstream banking_front   { server frontend:5173; }
  upstream admin_front     { server admin-frontend:5173; }

  server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    # Strict CSP applied to every response. `always` ensures it sticks on
    # 4xx/5xx too. Inheritance: no `add_header` in any location block, so
    # all locations get this one.
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
      always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/admin/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin SPA — Vite serves under base='/admin/' so paths line up.
    location /admin/ {
      proxy_pass http://admin_front;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }

    location = /admin {
      return 301 /admin/;
    }

    # Banking app (default).
    location / {
      proxy_pass http://banking_front;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }
  }
}
